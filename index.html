<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>产品图片库</title>
    <meta
      name="description"
      content="一个可部署到 GitHub Pages 的产品图片展示网页，用于展示、筛选和预览电商图片。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="hero">
      <nav class="topbar" aria-label="页面导航">
        <a class="brand" href="./">Image Gallery</a>
        <!-- <a class="nav-link" href="#manage">如何更新图片</a> -->
      </nav>

      <section class="hero-content">
        <p class="eyebrow">GitHub Pages 静态展示页</p>
        <h1>产品图片库</h1>
        <p class="hero-copy">当前样本来自 Q-005握力器图片组。</p>
        <div class="hero-actions">
          <a class="button primary" href="#gallery">查看图片</a>
          <!-- <a class="button secondary" href="#manage">更新方法</a> -->
        </div>
      </section>
    </header>

    <main>
      <section class="toolbar" aria-label="图片筛选工具">
        <div>
          <p class="section-kicker">Gallery</p>
          <h2 id="gallery">图片列表</h2>
        </div>
        <div class="controls">
          <label class="search">
            <span>搜索</span>
            <input
              id="searchInput"
              type="search"
              placeholder="输入标题、类型或文件名"
            />
          </label>
          <label class="select">
            <span>类型</span>
            <select id="typeFilter">
              <option value="all">全部</option>
            </select>
          </label>
        </div>
      </section>

      <section class="summary" aria-label="图库概览">
        <article>
          <strong id="imageCount">0</strong>
          <span>张图片</span>
        </article>
        <article>
          <strong id="typeCount">0</strong>
          <span>个分类</span>
        </article>
        <article>
          <strong>0</strong>
          <span>后端依赖</span>
        </article>
      </section>

      <section
        id="galleryGrid"
        class="gallery-grid"
        aria-live="polite"
      ></section>

      <section id="emptyState" class="empty-state" hidden>
        没有找到匹配的图片。请换一个关键词或分类。
      </section>

          <p>

            是静态托管，网页本身不能把访问者上传的文件永久写回仓库。
            正确维护方式是把图片放进仓库，再更新图片数据文件。
          </p>
        </div> -->

          <li>
            <strong>上传图片</strong>
            <span>把新图片放到 <code>assets/images/</code>。</span>
          </li>
          <li>

            <span
              >编辑
              <code>gallery-data.js</code>
              里的标题、分类、说明和文件路径。</span
            >
          </li>
          <li>

            <span
              >从
              <code>gallery-data.js</code>
              移除对应条目，再手动删除那一个明确图片文件。</span
            >
          </li>
          <li>

            <span>提交并推送到 GitHub，Pages 会自动刷新线上网页。</span>
          </li>
        </ol>

        <div class="note">
          如果需要“别人也能在网页里登录后上传/删除/改图”，需要增加后端或云存储，例如
          Supabase、Cloudinary、Firebase、或者 GitHub App。不要把 GitHub Token
          写进前端页面。
        </div> -->
      </section>
    </main>

    <dialog id="lightbox" class="lightbox" aria-label="图片预览">
      <button
        id="closeLightbox"
        class="icon-button"
        type="button"
        aria-label="关闭预览"
      >
        ×
      </button>
      <img id="lightboxImage" alt="" />
      <div class="lightbox-meta">
        <h3 id="lightboxTitle"></h3>
        <p id="lightboxDescription"></p>
        <a id="downloadLink" class="button secondary" href="#" download
          >下载图片</a
        >
      </div>
    </dialog>

    <script src="./gallery-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
