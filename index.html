<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KALPORO Product Gallery</title>
    <meta
      name="description"
      content="A product image gallery for displaying, filtering, and previewing ecommerce images on KALPORO Pages."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="hero">
      <nav class="topbar" aria-label="Page navigation">
        <a class="brand" href="./">KALPORO</a>
      </nav>

      <section class="hero-content">
        <p class="eyebrow">KALPORO Pages Static Gallery</p>
        <h1>Product Gallery</h1>
        <p class="hero-copy">
          Explore, filter, and preview the KALPORO product image collection.
        </p>
        <div class="hero-actions">
          <a class="button primary" href="#gallery">View Images</a>
        </div>
      </section>
    </header>

    <main>
      <section class="toolbar" aria-label="Image filtering tools">
        <div>
          <p class="section-kicker">KALPORO</p>
          <h2 id="gallery">Image List</h2>
        </div>
        <div class="controls">
          <label class="search">
            <span>Search</span>
            <input
              id="searchInput"
              type="search"
              placeholder="Enter a title, type, or filename"
            />
          </label>
          <label class="select">
            <span>Type</span>
            <select id="typeFilter">
              <option value="all">All</option>
            </select>
          </label>
        </div>
      </section>

      <nav
        id="categoryLinks"
        class="category-links"
        aria-label="Category links"
      ></nav>

      <section class="summary" aria-label="Gallery overview">
        <article>
          <strong id="imageCount">0</strong>
          <span>images</span>
        </article>
        <article>
          <strong id="typeCount">0</strong>
          <span>categories</span>
        </article>
      </section>

      <section
        id="galleryGrid"
        class="gallery-grid"
        aria-live="polite"
      ></section>

      <section id="emptyState" class="empty-state" hidden>
        No matching images found. Try another keyword or category.
      </section>
    </main>

    <dialog id="lightbox" class="lightbox" aria-label="Image preview">
      <button
        id="closeLightbox"
        class="icon-button"
        type="button"
        aria-label="Close preview"
      >
        ×
      </button>
      <img id="lightboxImage" alt="" />
      <div class="lightbox-meta">
        <h3 id="lightboxTitle"></h3>
        <p id="lightboxDescription"></p>
        <a id="downloadLink" class="button secondary" href="#" download
          >Download Image</a
        >
      </div>
    </dialog>

    <script src="./gallery-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
